<!DOCTYPE html>
<html>
<head>
    <title>Mitigation API Debug</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #0a0e14; color: #00ff88; }
        pre { background: #1a1e24; padding: 15px; border-radius: 5px; overflow-x: auto; }
        button { background: #00ff88; color: #0a0e14; border: none; padding: 10px 20px; cursor: pointer; }
        .error { color: #ff4444; }
        .success { color: #00ff88; }
    </style>
</head>
<body>
    <h1>Mitigation API Debug</h1>

    <button onclick="testAPI()">Test API Call</button>

    <h2>Result:</h2>
    <pre id="result">Click button to test...</pre>

    <script>
        function testAPI() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = 'Fetching...';

            fetch('/security-dashboard/api/mitigation_data.php', {
                credentials: 'same-origin',
                headers: {
                    'X-Auth-User-Id': '<?php echo (int)($_COOKIE["user_id"] ?? 1); ?>',
                    'X-Auth-Super': 'false'
                }
            })
            .then(res => {
                console.log('Response status:', res.status);
                console.log('Response headers:', res.headers);
                return res.json();
            })
            .then(data => {
                console.log('Response data:', data);
                resultEl.className = 'success';
                resultEl.textContent = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                console.error('Error:', err);
                resultEl.className = 'error';
                resultEl.textContent = 'ERROR: ' + err.message;
            });
        }

        // Auto-run on load
        window.onload = testAPI;
    </script>
</body>
</html>
