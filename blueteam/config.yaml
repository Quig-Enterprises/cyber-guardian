# Blue Team Configuration — Alfred Server
database:
  host: 127.0.0.1
  port: 5432
  name: alfred_admin
  user: alfred_admin
  password: Xk9OUuMWtRkBEnY2jugt6992

monitoring:
  poll_interval_sec: 30
  log_retention_days: 90
  verbose: false

alerting:
  email:
    enabled: true
    smtp_host: localhost
    smtp_port: 25
    from_address: blueteam@alfred.localdomain
    recipients:
      - alfred@devteam.quigs.com
  syslog:
    enabled: true
    facility: local6

collectors:
  db_audit:
    enabled: false  # audit_events table not present in alfred_admin
  syslog:
    enabled: true
    path: /var/log/syslog
  nginx:
    enabled: true
    path: /var/log/nginx/access.log
  php_errors:
    enabled: false
    paths:
      - /var/www/html/eqmon/logs/server_errors.log
  redteam:
    enabled: true
    reports_dir: /opt/claude-workspace/projects/cyber-guardian/reports

correlation:
  window_seconds: 300
  rules:
    brute_force:
      threshold: 5
      window_seconds: 300
    credential_stuffing:
      threshold: 10
      window_seconds: 300
    data_exfiltration:
      threshold: 20
      window_seconds: 3600

compliance:
  framework: "NIST SP 800-171r2"
  target_level: "CMMC Level 2"
  controls_count: 110
