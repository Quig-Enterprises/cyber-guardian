# Blue Team Configuration
database:
  host: localhost
  port: 5432
  name: eqmon
  user: eqmon
  # password loaded from EQMON_AUTH_DB_PASS env var

monitoring:
  poll_interval_sec: 5
  log_retention_days: 90

alerting:
  email:
    enabled: false
    smtp_host: localhost
    smtp_port: 587
    from_address: blueteam@eqmon.local
    recipients: []
  syslog:
    enabled: true
    facility: local6

collectors:
  db_audit:
    enabled: true
  syslog:
    enabled: true
    path: /var/log/syslog
  nginx:
    enabled: true
    path: /var/log/nginx/access.log
  php_errors:
    enabled: true
    paths:
      - /var/www/html/eqmon/logs/server_errors.log
      - /opt/eqmon/logs/server_errors.log
  redteam:
    enabled: true
    reports_dir: /opt/security-red-team/reports  # shared dashboard report dir

correlation:
  window_seconds: 300
  rules:
    brute_force:
      threshold: 5
      window_seconds: 300
    credential_stuffing:
      threshold: 10
      window_seconds: 300
    data_exfiltration:
      threshold: 20
      window_seconds: 3600

compliance:
  framework: "NIST SP 800-171r2"
  target_level: "CMMC Level 2"
  controls_count: 110
