target:
  type: "app"  # Valid: app, ai, wordpress, generic (comma-separated for multi-target)
  base_url: "http://localhost:8081"
  api_path: "/api"
  generic:
    test_endpoints:
      - "/"
    login_endpoint: "/login"
    login_fields:
      username_field: "username"
      password_field: "password"
  wordpress:
    login_path: "/wp-login.php"
    rest_prefix: "/wp-json"
    xmlrpc_path: "/xmlrpc.php"
    admin_path: "/wp-admin"
    cron_path: "/wp-cron.php"
    content_path: "/wp-content"
    plugins: []

auth:
  test_users:
    system_admin:
      username: ""
      password: ""
      role: "system-admin"
    viewer:
      username: ""
      password: ""
      role: "viewer"
    wp_admin:
      username: ""
      password: ""
      role: "administrator"
    wp_subscriber:
      username: ""
      password: ""
      role: "subscriber"

# runner.py accesses config["redteam"]["auth"] for app/ai target types
redteam:
  auth:
    test_users:
      system_admin:
        username: ""
        password: ""
        role: "system-admin"
      viewer:
        username: ""
        password: ""
        role: "viewer"

test_data:
  session_id_prefix: "redteam-"
  analysis_id: "d381c227-4ae2-442b-bc04-970fecc7ca9e"
  instance_id: "default"

cleanup:
  enabled: true
  delete_messages: true
  delete_notes: true

reporting:
  formats: ["console", "json", "html"]
  output_dir: "reports/"

ai_attacker:
  enabled: true
  attacker_model: "qwen2.5:32b"
  judge_model: "llama3.2:latest"
  ollama_url: "http://localhost:11434/api/chat"

execution:
  mode: "full"
  aws:
    skip_attacks:
      - "api.ssrf"
      - "api.dos_resilience"
      - "wordpress.xmlrpc_abuse"
      - "wordpress.brute_force"
      - "wordpress.cron_abuse"
    throttle:
      wordpress.user_enumeration:
        max_author_ids: 5
        delay_ms: 200
      wordpress.plugin_enumeration:
        max_plugins: 50
        delay_ms: 100
      wordpress.plugin_audit:
        max_ajax_probes: 20
        delay_ms: 200

cve:
  enabled: true
  data_dir: "data/cve"
  api_keys:
    nvd: ""
    wpscan: ""
    vulners: ""
    github: ""
  sources:
    nvd: true
    wpvulnerability: true
    osv: true
    wpscan: true
    vulners: true
    github_advisory: true
    cvelistv5: true
    kev: true
    exploitdb: true
  cache:
    memory_max_entries: 500
    memory_ttl_seconds: 1800
    disk_ttl_seconds: 86400
  sync:
    auto_warn_stale: true
    cvelistv5_max_age_hours: 24
    kev_max_age_hours: 168
    exploitdb_max_age_hours: 168
  verification:
    enabled: true
    # Mode: "blueteam" (read actual files), "probe" (HTTP only), "both" (try blueteam first)
    mode: "both"  # RECOMMENDED: "both" for definitive answers with fallback
    # Config endpoints to probe (in order of preference)
    config_endpoints:
      nginx:
        - "/admin/nginx/config"
        - "/admin/config"
        - "/nginx.conf"
      php:
        - "/phpinfo.php"
        - "/?phpinfo=1"
        - "/admin/phpinfo.php"
    # Verification aggressiveness
    aggressiveness: "low"  # "low"|"medium"|"high"
    # low: Only check exposed configs
    # medium: Attempt common misconfigurations
    # high: Include directory traversal probes (risky)
    # CVE-specific verification (enable/disable individual checks)
    specific_cves:
      CVE-2019-11043: true
      CVE-2024-4577: true
      CVE-2016-10033: true
      CVE-2013-4547: true

database:
  host: "localhost"
  name: "eqmon"
  user: "eqmon"
  password: "3eK4NNHxLQakuTQK5KcnB3Vz"
