target:
  type: "eqmon"  # "eqmon" or "wordpress"
  base_url: "http://localhost:8081"
  api_path: "/api"
  generic:
    test_endpoints:
      - "/"
    login_endpoint: "/login"
    login_fields:
      username_field: "username"
      password_field: "password"
  wordpress:
    login_path: "/wp-login.php"
    rest_prefix: "/wp-json"
    xmlrpc_path: "/xmlrpc.php"
    admin_path: "/wp-admin"
    cron_path: "/wp-cron.php"
    content_path: "/wp-content"
    plugins: []

auth:
  test_users:
    system_admin:
      username: "redteam-sysadmin@test.com"
      password: "RedTeam$ysAdmin2026!"
      role: "system-admin"
    viewer:
      username: "redteam-viewer@test.com"
      password: "RedTeamV!ewer2026!"
      role: "viewer"
    wp_admin:
      username: "${WP_ADMIN_USER}"
      password: "${WP_ADMIN_PASS}"
      role: "administrator"
    wp_subscriber:
      username: "${WP_SUBSCRIBER_USER}"
      password: "${WP_SUBSCRIBER_PASS}"
      role: "subscriber"

test_data:
  session_id_prefix: "redteam-"
  analysis_id: "d381c227-4ae2-442b-bc04-970fecc7ca9e"
  instance_id: "default"

cleanup:
  enabled: true
  delete_messages: true
  delete_notes: true

reporting:
  formats: ["console", "json", "html"]
  output_dir: "reports/"

ai_attacker:
  enabled: true
  attacker_model: "qwen2.5:32b"
  judge_model: "llama3.2:latest"
  ollama_url: "http://localhost:11434/api/chat"

execution:
  mode: "full"
  aws:
    skip_attacks:
      - "api.ssrf"
      - "api.dos_resilience"
      - "wordpress.xmlrpc_abuse"
      - "wordpress.brute_force"
      - "wordpress.cron_abuse"
    throttle:
      wordpress.user_enumeration:
        max_author_ids: 5
        delay_ms: 200
      wordpress.plugin_enumeration:
        max_plugins: 50
        delay_ms: 100
      wordpress.plugin_audit:
        max_ajax_probes: 20
        delay_ms: 200

database:
  host: "localhost"
  name: "eqmon"
  user: "eqmon"
  password: "3eK4NNHxLQakuTQK5KcnB3Vz"
